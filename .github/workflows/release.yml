name: Release

on:
  push:
    branches: [main]
    paths:
      - "package.json"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: diff
        run: |
          OLD=$(git show HEAD~1:package.json | jq -r '.version' 2>/dev/null || echo "")
          NEW=$(jq -r '.version' package.json)
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

  create-release:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Create git tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.check-version.outputs.version }}"
          generate_release_notes: true
          draft: false

  build:
    needs: [check-version, create-release]
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: ambry-darwin-arm64
            artifact: tar
          - os: macos-13
            name: ambry-darwin-x64
            artifact: tar
          - os: ubuntu-latest
            name: ambry-linux-x64
            artifact: linux
          - os: windows-latest
            name: ambry-windows-x64
            artifact: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: "v${{ needs.check-version.outputs.version }}"
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      # ── Linux deps ──────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libfuse2

      # ── Windows deps ────────────────────────────────────────────
      - name: Install WebView2
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory webview2
          $loader = Get-ChildItem -Path webview2 -Recurse -Filter "WebView2Loader.dll" | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          Copy-Item $loader.FullName -Destination "C:\Windows\System32\WebView2Loader.dll"
          $lib = Get-ChildItem -Path webview2 -Recurse -Filter "WebView2LoaderStatic.lib" | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          if ($lib) { Copy-Item $lib.FullName -Destination "WebView2Loader.lib" }
          $headerDir = Get-ChildItem -Path webview2 -Recurse -Filter "WebView2.h" | Select-Object -First 1
          if ($headerDir) { Copy-Item $headerDir.DirectoryName\* -Destination "." -Filter "*.h" }

      # ── Build ───────────────────────────────────────────────────
      - name: Compile
        run: bun run build

      - name: Bundle
        run: bun run bundle

      # ── Package: macOS ──────────────────────────────────────────
      - name: Package macOS
        if: matrix.artifact == 'tar'
        run: |
          cd dist
          tar czf ../${{ matrix.name }}.tar.gz Ambry.app

      # ── Package: Linux (.AppImage + .deb) ───────────────────────
      - name: Package Linux AppImage
        if: matrix.artifact == 'linux'
        run: |
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool dist/Ambry.AppDir ${{ matrix.name }}.AppImage

      - name: Package Linux deb
        if: matrix.artifact == 'linux'
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          PKG="ambry_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"

          cp dist/Ambry.AppDir/usr/bin/ambry "${PKG}/usr/bin/ambry"
          chmod 755 "${PKG}/usr/bin/ambry"

          cat > "${PKG}/usr/share/applications/ambry.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Ambry
          Exec=ambry
          Icon=ambry
          Categories=Utility;Development;
          Comment=Desktop database management GUI
          EOF

          cat > "${PKG}/DEBIAN/control" << EOF
          Package: ambry
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0
          Maintainer: Wess Cope <wess@wess.io>
          Description: Desktop database management GUI
           Open-source, cross-platform database client supporting
           PostgreSQL, MySQL, and SQLite.
          EOF

          dpkg-deb --build "${PKG}"
          mv "${PKG}.deb" "${{ matrix.name }}.deb"

      # ── Package: Windows (.zip + NSIS installer) ────────────────
      - name: Package Windows zip
        if: matrix.artifact == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Ambry\*" -DestinationPath "${{ matrix.name }}.zip"

      - name: Package Windows installer
        if: matrix.artifact == 'windows'
        shell: pwsh
        run: |
          $version = "${{ needs.check-version.outputs.version }}"
          choco install nsis -y
          $nsi = @"
          !include "MUI2.nsh"

          Name "Ambry"
          OutFile "${{ matrix.name }}-setup.exe"
          InstallDir "`$PROGRAMFILES64\Ambry"
          RequestExecutionLevel admin

          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File /r "dist\Ambry\*.*"

            CreateDirectory "`$SMPROGRAMS\Ambry"
            CreateShortcut "`$SMPROGRAMS\Ambry\Ambry.lnk" "`$INSTDIR\ambry.exe"
            CreateShortcut "`$DESKTOP\Ambry.lnk" "`$INSTDIR\ambry.exe"

            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Ambry" "DisplayName" "Ambry"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Ambry" "DisplayVersion" "${version}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Ambry" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Ambry" "Publisher" "Wess Cope"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            RMDir /r "`$SMPROGRAMS\Ambry"
            Delete "`$DESKTOP\Ambry.lnk"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Ambry"
          SectionEnd
          "@
          $nsi | Out-File -Encoding ASCII "installer.nsi"
          makensis installer.nsi

      # ── Upload ──────────────────────────────────────────────────
      - name: Upload macOS
        if: matrix.artifact == 'tar'
        run: gh release upload "v${{ needs.check-version.outputs.version }}" ${{ matrix.name }}.tar.gz --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Linux
        if: matrix.artifact == 'linux'
        run: |
          gh release upload "v${{ needs.check-version.outputs.version }}" \
            ${{ matrix.name }}.AppImage \
            ${{ matrix.name }}.deb \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Windows
        if: matrix.artifact == 'windows'
        shell: pwsh
        run: |
          gh release upload "v${{ needs.check-version.outputs.version }}" "${{ matrix.name }}.zip" "${{ matrix.name }}-setup.exe" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - name: Download release archives and compute SHAs
        id: shas
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          BASE="https://github.com/wess/ambry/releases/download/v${VERSION}"
          for target in darwin-arm64 darwin-x64 linux-x64; do
            FILE="ambry-${target}.tar.gz"
            for i in $(seq 1 30); do
              if curl -fsSL -o "/tmp/${FILE}" "${BASE}/${FILE}" 2>/dev/null; then
                echo "${target} available"
                break
              fi
              echo "Waiting for ${target}... ($i/30)"
              sleep 10
            done
            SHA=$(sha256sum "/tmp/${FILE}" | cut -d' ' -f1)
            KEY=$(echo "${target}" | tr '-' '_')
            echo "sha_${KEY}=${SHA}" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout homebrew tap
        uses: actions/checkout@v5
        with:
          repository: wess/homebrew-packages
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          cat > tap/Formula/ambry.rb << 'RUBY'
          class Ambry < Formula
            desc "Open-source, cross-platform database client"
            homepage "https://github.com/wess/ambry"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            if OS.mac?
              if Hardware::CPU.intel?
                url "https://github.com/wess/ambry/releases/download/v#{version}/ambry-darwin-x64.tar.gz"
                sha256 "SHA_DARWIN_X64_PLACEHOLDER"
              else
                url "https://github.com/wess/ambry/releases/download/v#{version}/ambry-darwin-arm64.tar.gz"
                sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"
              end
            elsif OS.linux?
              url "https://github.com/wess/ambry/releases/download/v#{version}/ambry-linux-x64.tar.gz"
              sha256 "SHA_LINUX_X64_PLACEHOLDER"
            end

            def install
              if OS.mac?
                prefix.install "Ambry.app"
                bin.write_exec_script prefix/"Ambry.app/Contents/MacOS/ambry"
              else
                bin.install "ambry"
              end
            end

            def caveats
              if OS.mac?
                <<~EOS
                  Ambry.app has been installed to:
                    #{prefix}/Ambry.app

                  To add it to Applications:
                    ln -sf #{prefix}/Ambry.app /Applications/Ambry.app
                EOS
              end
            end

            test do
              assert_predicate bin/"ambry", :exist?
            end
          end
          RUBY
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Formula/ambry.rb
          sed -i "s/SHA_DARWIN_X64_PLACEHOLDER/${{ steps.shas.outputs.sha_darwin_x64 }}/g" tap/Formula/ambry.rb
          sed -i "s/SHA_DARWIN_ARM64_PLACEHOLDER/${{ steps.shas.outputs.sha_darwin_arm64 }}/g" tap/Formula/ambry.rb
          sed -i "s/SHA_LINUX_X64_PLACEHOLDER/${{ steps.shas.outputs.sha_linux_x64 }}/g" tap/Formula/ambry.rb

      - name: Push updated formula
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ambry.rb
          git commit -m "Update ambry to v${{ needs.check-version.outputs.version }}"
          git push
