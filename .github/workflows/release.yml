name: Release

on:
  push:
    branches: [main]
    paths:
      - "package.json"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: diff
        run: |
          OLD=$(git show HEAD~1:package.json | jq -r '.version' 2>/dev/null || echo "")
          NEW=$(jq -r '.version' package.json)
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

  create-release:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Create git tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.check-version.outputs.version }}"
          generate_release_notes: true
          draft: false

  build:
    needs: [check-version, create-release]
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: ambry-darwin-arm64
            artifact: tar
          - os: ubuntu-latest
            name: ambry-linux-x64
            artifact: linux
          - os: windows-latest
            name: ambry-windows-x64
            artifact: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: "v${{ needs.check-version.outputs.version }}"
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      # ── Linux deps ──────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libgtk-3-dev libwebkit2gtk-4.1-dev libfuse2

      # ── Windows deps ────────────────────────────────────────────
      - name: Install WebView2
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory webview2
          $pkgDir = Get-ChildItem -Path webview2 -Directory | Select-Object -First 1

          # DLL for runtime
          $dll = Get-ChildItem -Path $pkgDir.FullName -Recurse -Filter "WebView2Loader.dll" | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          Copy-Item $dll.FullName -Destination "C:\Windows\System32\WebView2Loader.dll"

          # Static lib for linking — copy as WebView2Loader.lib so -lWebView2Loader finds it
          $staticLib = Get-ChildItem -Path $pkgDir.FullName -Recurse -Filter "WebView2LoaderStatic.lib" | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          if ($staticLib) {
            Copy-Item $staticLib.FullName -Destination "WebView2Loader.lib"
          } else {
            # Fall back to the import lib
            $importLib = Get-ChildItem -Path $pkgDir.FullName -Recurse -Filter "WebView2Loader.dll.lib" | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
            if ($importLib) { Copy-Item $importLib.FullName -Destination "WebView2Loader.lib" }
          }

          # Headers
          $header = Get-ChildItem -Path $pkgDir.FullName -Recurse -Filter "WebView2.h" | Select-Object -First 1
          if ($header) { Copy-Item (Join-Path $header.DirectoryName "*.h") -Destination "." }

          # Add CWD to library search path for GCC
          echo "LIBRARY_PATH=$PWD" >> $env:GITHUB_ENV

      # ── Build ───────────────────────────────────────────────────
      - name: Compile
        run: bun run build

      - name: Bundle
        run: bun run bundle

      # ── Sign: macOS ─────────────────────────────────────────────
      # Re-signs the entire .app bundle after `butter bundle` so Info.plist,
      # resources, and the Mach-O binary share one signature. Without this
      # step, downloaded apps fail Gatekeeper with "damaged" because
      # bun build --compile only linker-signs the inner binary.
      #
      # When APPLE_ID / APPLE_TEAM_ID / APPLE_APP_PASSWORD secrets are
      # configured, the app is also notarized and stapled — that removes
      # the "unidentified developer" prompt entirely. Without those secrets
      # the ad-hoc signature still fixes "damaged"; users get the standard
      # right-click → Open flow on first launch.
      - name: Sign macOS
        if: matrix.artifact == 'tar'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_APP_PASSWORD" ] && [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Signing with Developer ID and notarizing..."
            bun run sign -- --identity "$APPLE_SIGNING_IDENTITY" --notarize
          else
            echo "Apple credentials not configured — falling back to ad-hoc signature."
            codesign --force --deep --sign - --options runtime --identifier io.wess.ambry dist/Ambry.app
          fi
          codesign --verify --deep --strict --verbose=2 dist/Ambry.app

      # ── Package: macOS ──────────────────────────────────────────
      - name: Package macOS
        if: matrix.artifact == 'tar'
        run: |
          cd dist
          tar czf ../${{ matrix.name }}.tar.gz Ambry.app

      # ── Package: Linux (.AppImage + .deb) ───────────────────────
      # butter writes the macOS UTI from bundle.category into the .desktop
      # Categories= field, which AppImage validation rejects. Rewrite to
      # FreeDesktop-spec categories before running appimagetool.
      - name: Fix .desktop categories
        if: matrix.artifact == 'linux'
        run: sed -i 's|^Categories=.*|Categories=Utility;Development;|' dist/Ambry.AppDir/ambry.desktop

      - name: Package Linux AppImage
        if: matrix.artifact == 'linux'
        run: |
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool dist/Ambry.AppDir ${{ matrix.name }}.AppImage

      - name: Package Linux deb
        if: matrix.artifact == 'linux'
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          PKG="ambry_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"

          cp dist/Ambry.AppDir/usr/bin/ambry "${PKG}/usr/bin/ambry"
          chmod 755 "${PKG}/usr/bin/ambry"

          cat > "${PKG}/usr/share/applications/ambry.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Ambry
          Exec=ambry
          Icon=ambry
          Categories=Utility;Development;
          Comment=Desktop database management GUI
          EOF

          cat > "${PKG}/DEBIAN/control" << EOF
          Package: ambry
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0
          Maintainer: Wess Cope <wess@wess.io>
          Description: Desktop database management GUI
           Open-source, cross-platform database client supporting
           PostgreSQL, MySQL, and SQLite.
          EOF

          dpkg-deb --build "${PKG}"
          mv "${PKG}.deb" "${{ matrix.name }}.deb"

      # ── Package: Windows (.zip + NSIS installer) ────────────────
      - name: Package Windows zip
        if: matrix.artifact == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Ambry\*" -DestinationPath "${{ matrix.name }}.zip"

      - name: Package Windows installer
        if: matrix.artifact == 'windows'
        shell: pwsh
        run: |
          $version = "${{ needs.check-version.outputs.version }}"
          choco install nsis -y
          $nsi = @"
          !include "MUI2.nsh"

          Name "Ambry"
          OutFile "${{ matrix.name }}-setup.exe"
          InstallDir "`$PROGRAMFILES64\Ambry"
          RequestExecutionLevel admin

          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File /r "dist\Ambry\*.*"

            CreateDirectory "`$SMPROGRAMS\Ambry"
            CreateShortcut "`$SMPROGRAMS\Ambry\Ambry.lnk" "`$INSTDIR\ambry.exe"
            CreateShortcut "`$DESKTOP\Ambry.lnk" "`$INSTDIR\ambry.exe"

            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Ambry" "DisplayName" "Ambry"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Ambry" "DisplayVersion" "${version}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Ambry" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Ambry" "Publisher" "Wess Cope"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            RMDir /r "`$SMPROGRAMS\Ambry"
            Delete "`$DESKTOP\Ambry.lnk"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Ambry"
          SectionEnd
          "@
          $nsi | Out-File -Encoding ASCII "installer.nsi"
          makensis installer.nsi

      # ── Upload ──────────────────────────────────────────────────
      - name: Upload macOS
        if: matrix.artifact == 'tar'
        run: gh release upload "v${{ needs.check-version.outputs.version }}" ${{ matrix.name }}.tar.gz --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Linux
        if: matrix.artifact == 'linux'
        run: |
          gh release upload "v${{ needs.check-version.outputs.version }}" \
            ${{ matrix.name }}.AppImage \
            ${{ matrix.name }}.deb \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Windows
        if: matrix.artifact == 'windows'
        shell: pwsh
        run: |
          gh release upload "v${{ needs.check-version.outputs.version }}" "${{ matrix.name }}.zip" "${{ matrix.name }}-setup.exe" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - name: Download darwin-arm64 archive and compute SHA
        id: shas
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          URL="https://github.com/wess/ambry/releases/download/v${VERSION}/ambry-darwin-arm64.tar.gz"
          for i in $(seq 1 30); do
            if curl -fsSL -o /tmp/ambry-darwin-arm64.tar.gz "${URL}" 2>/dev/null; then
              break
            fi
            echo "Waiting for darwin-arm64 archive... ($i/30)"
            sleep 10
          done
          SHA=$(sha256sum /tmp/ambry-darwin-arm64.tar.gz | cut -d' ' -f1)
          echo "sha_darwin_arm64=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v5
        with:
          repository: wess/homebrew-packages
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          cat > tap/Formula/ambry.rb << 'RUBY'
          class Ambry < Formula
            desc "Open-source, cross-platform database client"
            homepage "https://github.com/wess/ambry"
            url "https://github.com/wess/ambry/releases/download/vVERSION_PLACEHOLDER/ambry-darwin-arm64.tar.gz"
            version "VERSION_PLACEHOLDER"
            sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"
            license "MIT"

            depends_on arch: :arm64
            depends_on :macos

            def install
              prefix.install "Ambry.app"
              bin.write_exec_script prefix/"Ambry.app/Contents/MacOS/ambry"
            end

            def caveats
              <<~EOS
                Ambry.app has been installed to:
                  #{prefix}/Ambry.app

                To add it to Applications:
                  ln -sf #{prefix}/Ambry.app /Applications/Ambry.app
              EOS
            end

            test do
              assert_path_exists bin/"ambry"
            end
          end
          RUBY
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Formula/ambry.rb
          sed -i "s/SHA_DARWIN_ARM64_PLACEHOLDER/${{ steps.shas.outputs.sha_darwin_arm64 }}/g" tap/Formula/ambry.rb

      - name: Push updated formula
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ambry.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged — skipping push."
          else
            git commit -m "Update ambry to v${{ needs.check-version.outputs.version }}"
            git push
          fi
